<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sell a Book - BookBazaar AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#2563eb;
    color:white;
    padding:15px;
    text-align:center;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2563eb;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

textarea{
    resize:none;
}

.submit-btn{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.submit-btn:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<header>
    <h1>📚 BookBazaar AI</h1>

    <nav>
        <a href="Home Page.html">Home</a>
        <a href="Book Listing page.html">Buy Books</a>
        <a href="Sell a Book Page.html">Sell Book</a>
        <a href="AI Recommendation chatbot.html">AI Chatbot</a>
        <a href="AI Summary Feature.html">AI Summary</a>
    </nav>
</header>

<div class="container">

    <h2>Sell Your Book</h2>

    <div class="form-group">
        <label>Book Name</label>
        <input type="text" id="bookName" placeholder="Enter Book Name">
    </div>

    <div class="form-group">
        <label>Author Name</label>
        <input type="text" id="author" placeholder="Enter Author Name">
    </div>

    <div class="form-group">
        <label>Category</label>
        <select id="category">
            <option>Academic</option>
            <option>Competitive Exams</option>
            <option>Novel</option>
            <option>School Books</option>
        </select>
    </div>

    <div class="form-group">
        <label>Book Condition</label>
        <select id="condition">
            <option>Like New</option>
            <option>Good</option>
            <option>Used</option>
        </select>
    </div>

    <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="price" placeholder="Enter Price">
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea id="description" rows="4"
        placeholder="Write about the book"></textarea>
    </div>

    <div class="form-group">
        <label>Upload Book Image</label>
        <input type="file" id="image">
    </div>

    <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" id="contact"
        placeholder="Enter Mobile Number">
    </div>

    <button type="button"
    class="submit-btn"
    onclick="sellBook()">
        Sell Book
    </button>

</div>

<script>

async function sellBook(){

    const data = {
        bookName:
        document.getElementById("bookName").value,

        author:
        document.getElementById("author").value,

        category:
        document.getElementById("category").value,

        condition:
        document.getElementById("condition").value,

        price:
        document.getElementById("price").value,

        description:
        document.getElementById("description").value,

        contact:
        document.getElementById("contact").value

    };


}

</script>

</body>
</html>
